name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: write
  id-token: write

env:
  PYTHON_VERSION: '3.11'

jobs:
  # ── Validate that the tag matches the source version ────────────
  validate-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Extract tag version
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Extract source version
        id: source
        run: |
          VERSION=$(python -c "import importlib.metadata; print(importlib.metadata.version('anvil-agent'))" 2>/dev/null || \
            python -c "from anvil import __version__; print(__version__)" 2>/dev/null || \
            python scripts/sync_versions.py --dry-run 2>/dev/null | grep 'Current version' | awk '{print $3}')
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify version match
        run: |
          TAG_V="${{ steps.tag.outputs.VERSION }}"
          SRC_V="${{ steps.source.outputs.VERSION }}"
          if [ "$TAG_V" != "$SRC_V" ]; then
            echo "::error::Tag version ($TAG_V) does not match source version ($SRC_V)"
            exit 1
          fi
          echo "✓ Version match confirmed: $TAG_V"

  # ── Build all packages ───────────────────────────────────────────
  build:
    needs: validate-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package:
          - anvil
          - verifyloop
          - error-recovery
          - agent-swarm
          - agent-runtime
          - agent-skills
          - agent-constitution
          - agent-curriculum
          - agent-fuzzer
          - agent-profiler
          - agent-telemetry
          - bench-agent
          - cost-optimizer
          - shell-whisperer
          - reason-critic
          - fableforge-14b
          - fable5-dataset
          - trace-compiler
          - trajectory-distiller
          - cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build tools
        run: python -m pip install build --upgrade

      - name: Build package
        run: |
          cd ${{ matrix.package }}
          python -m build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package }}
          path: ${{ matrix.package }}/dist/
          retention-days: 7

  # ── Run tests before publishing ─────────────────────────────────
  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install Anvil with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "./anvil[dev]"

      - name: Run test suite
        run: pytest --tb=short -q --maxfail=5

      - name: Run verification pipeline
        run: anvil run "verify all recently changed files" --scope changed || true

  # ── Publish to PyPI ─────────────────────────────────────────────
  publish-pypi:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true

  # ── Create GitHub Release ───────────────────────────────────────
  github-release:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: notes
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"

          # Extract changelog for this version
          if [ -f CHANGELOG.md ]; then
            # Get the section between this version header and the previous one
            NOTES=$(sed -n "/## \[$VERSION\]/,/## \[/p" CHANGELOG.md | head -n -1 | tail -n +2)
          else
            NOTES="Release $VERSION"
          fi

          # Write to file for multiline GITHUB_OUTPUT
          echo "$NOTES" > /tmp/release_notes.md
          echo "FILE=/tmp/release_notes.md" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.notes.outputs.FILE }}
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
          generate_release_notes: true

  # ── Build and push Docker image ─────────────────────────────────
  docker:
    needs: [build, test]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/anvil
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./anvil
          file: ./anvil/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ github.ref_name }}
